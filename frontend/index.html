<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudSnap</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
  </style>

<link rel="stylesheet" href="/frontend/style.css" />
<script src="/frontend/main.js" defer></script>
</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <input id="fileInput" type="file" accept="image/*" multiple />
  <div class="app-shell">
    <div class="window">
      <nav class="titlebar">
        <div class="titlebar-left">
          <div class="logo-mark">
       <img src="/frontend/cloudsnap icon.png" alt="CloudSnap icon" width="60" height="60" />
          </div>
          <div class="logo">Cloud<span>Snap</span></div>
        </div>
      </nav>

      <section class="hero" id="upload">
        <h1>Host Images on the  <span>Cloud</span></h1>
        <p>upload images - deployed on kubernetes with Docker</p>
      </section>

      <div class="upload-wrap">
        <div class="upload-animation">
          <svg class="upload-svg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" aria-label="Animated upload illustration">
            <defs>
              <filter id="window-shadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#000000" flood-opacity="0.6" />
                <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
              </filter>

              <filter id="element-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
              </filter>

              <filter id="icon-shadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5" />
              </filter>

              <linearGradient id="space-gray-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#555555" />
                <stop offset="100%" stop-color="#333333" />
              </linearGradient>

              <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#2c2c2e" />
                <stop offset="100%" stop-color="#1c1c1e" />
              </linearGradient>

              <g id="file-icon" transform="translate(-14, -18)">
                <path d="M 4 0 L 18 0 L 28 10 L 28 32 A 2 2 0 0 1 26 34 L 4 34 A 2 2 0 0 1 2 32 L 2 2 A 2 2 0 0 1 4 0 Z" fill="#2c2c2e" filter="url(#icon-shadow)" />
                <polygon points="18,0 18,10 28,10" fill="#3a3a3c" />
                <polygon points="18,0 18,10 28,10" fill="none" stroke="#48484a" stroke-width="0.5" />
                <path d="M 4 0 L 18 0 L 28 10 L 28 32 A 2 2 0 0 1 26 34 L 4 34 A 2 2 0 0 1 2 32 L 2 2 A 2 2 0 0 1 4 0 Z" fill="none" stroke="#48484a" stroke-width="1" />
                <rect x="7" y="14" width="14" height="12" rx="2" fill="#d4d4d8" opacity="0.2" />
                <rect x="7" y="14" width="14" height="12" rx="2" fill="none" stroke="#d4d4d8" stroke-width="1" />
                <circle cx="11" cy="18" r="2" fill="#fafafa" />
                <path d="M 7 26 L 12 21 L 16 25 L 18 23 L 21 26 Z" fill="#d4d4d8" />
              </g>
            </defs>

            <path d="M 140 280 C 140 460, 500 460, 500 560" class="network-line" />
            <path d="M 140 280 C 140 460, 500 460, 500 560" class="data-flow">
              <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" />
            </path>

            <path d="M 500 280 L 500 560" class="network-line" />
            <path d="M 500 280 L 500 560" class="data-flow">
              <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" />
            </path>

            <path d="M 860 280 C 860 460, 500 460, 500 560" class="network-line" />
            <path d="M 860 280 C 860 460, 500 460, 500 560" class="data-flow">
              <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" />
            </path>

            <g opacity="0">
              <animateMotion id="upload-motion" dur="2s" begin="indefinite" fill="freeze" path="M 860 280 C 860 460, 500 460, 500 560" />
              <animate id="upload-opacity" attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.9; 1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" dur="2s" begin="indefinite" fill="freeze" />
              <use href="#file-icon" />
            </g>

            <g>
              <animateMotion dur="4.5s" begin="1.5s" repeatCount="indefinite" path="M 500 280 L 500 560" />
              <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.9; 1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" dur="4.5s" begin="1.5s" repeatCount="indefinite" />
              <use href="#file-icon" />
            </g>

            <g>
              <animateMotion dur="4.5s" begin="3s" repeatCount="indefinite" path="M 140 280 C 140 460, 500 460, 500 560" />
              <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.9; 1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1" dur="4.5s" begin="3s" repeatCount="indefinite" />
              <use href="#file-icon" />
            </g>

            <g id="drop-zone-group" transform="translate(860, 200)" style="cursor: pointer;">
              <rect id="drop-pulse" x="-116" y="-126" width="232" height="252" rx="22" fill="#d4d4d8" opacity="0" style="transition: opacity 0.2s ease;"></rect>
              <rect x="-110" y="-120" width="220" height="240" rx="20" fill="#1e1e1e" stroke="#48484a" stroke-width="2.5" stroke-dasharray="8 8" filter="url(#element-shadow)" />
              <g transform="translate(0, -30) scale(1.6)" stroke="#d4d4d8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 0 10 L 0 -14 M -10 -4 L 0 -14 L 10 -4" />
                <path d="M -20 4 L -20 16 A 4 4 0 0 0 -16 20 L 16 20 A 4 4 0 0 0 20 16 L 20 4" />
              </g>
              <text x="0" y="55" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="600">Drag &amp; Drop</text>
              <text x="0" y="80" font-size="15" fill="#8e8e93" text-anchor="middle">or click to upload</text>
            </g>

            <g transform="translate(500, 210)" filter="url(#element-shadow)">
              <circle cx="0" cy="0" r="50" fill="none" stroke="#d4d4d8" stroke-width="2" opacity="0">
                <animate attributeName="opacity" values="0; 0.3; 0" dur="2.5s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="scale" values="1; 1.2; 1" dur="2.5s" repeatCount="indefinite" />
              </circle>

              <rect x="-35" y="-35" width="70" height="20" rx="4" fill="url(#space-gray-grad)" stroke="#1c1c1e" stroke-width="1.5" />
              <rect x="-35" y="-15" width="70" height="4" fill="#000000" />

              <rect x="-35" y="-11" width="70" height="20" rx="4" fill="url(#space-gray-grad)" stroke="#1c1c1e" stroke-width="1.5" />
              <rect x="-35" y="9" width="70" height="4" fill="#000000" />

              <rect x="-35" y="13" width="70" height="20" rx="4" fill="url(#space-gray-grad)" stroke="#1c1c1e" stroke-width="1.5" />

              <circle cx="-25" cy="-25" r="2" fill="#30d158">
                <animate attributeName="opacity" values="0.2;1;0.2" dur="0.8s" repeatCount="indefinite"/>
              </circle>
              <circle cx="-25" cy="-1" r="2" fill="#30d158">
                <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/>
              </circle>
              <circle cx="-25" cy="23" r="2" fill="#30d158">
                <animate attributeName="opacity" values="0.2;1;0.2" dur="0.5s" repeatCount="indefinite"/>
              </circle>
            </g>

            <g transform="translate(140, 220)" filter="url(#element-shadow)">
              <rect x="-55" y="-45" width="110" height="70" rx="10" fill="none" stroke="#d4d4d8" stroke-width="2" opacity="0">
                <animate attributeName="opacity" values="0; 0.3; 0" dur="3s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="scale" values="1; 1.15; 1" dur="3s" repeatCount="indefinite" />
              </rect>

              <rect x="-40" y="-35" width="80" height="50" rx="4" fill="#48484a" stroke="#1c1c1e" stroke-width="1.5" />
              <rect x="-36" y="-31" width="72" height="42" rx="2" fill="#000000" />
              <rect x="-34" y="-29" width="68" height="38" rx="1" fill="url(#glass-grad)" />
              <rect x="-4" y="-27" width="8" height="8" rx="4" fill="#d4d4d8" opacity="0.2" />
              <path d="M -45 15 L 45 15 L 55 25 L -55 25 Z" fill="url(#space-gray-grad)" stroke="#1c1c1e" stroke-width="1.5" stroke-linejoin="round" />
              <rect x="-15" y="15" width="30" height="2" fill="#2c2c2e" />
            </g>

            <g transform="translate(500, 600)">
              <circle cx="0" cy="0" r="75" fill="none" stroke="#d4d4d8" stroke-width="1.5" opacity="0.2">
                <animate attributeName="r" values="70; 90; 70" dur="3s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.3; 0; 0.3" dur="3s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite" />
              </circle>

              <g id="custom-svg-wrapper" filter="url(#element-shadow)">
                <rect x="-42" y="-42" width="84" height="84" rx="20" fill="#2c2c2e" stroke="#d4d4d8" stroke-width="2"/>
                <image
                  href="/frontend/cloudsnap icon tp.png"
                  x="-24"
                  y="-24"
                  width="50"
                  height="50"
                  preserveAspectRatio="xMidYMid meet"
                />
              </g>
            </g>

            <path d="M 500 642 L 500 700" class="network-line" />
            <path d="M 500 642 L 500 700" class="data-flow">
              <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" />
            </path>
          </svg>

            
             
            </div>
          </div>
        </div>
      </div>

      <div class="library-connector" aria-hidden="true">
        <span class="connector-line"></span>
        <span class="connector-packet"></span>
        <span class="connector-label">Added to Library</span>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <section class="gallery-section" id="library">
        <div class="gallery-header">
          <h2>Library</h2>
          <span class="count-badge" id="countBadge">0 files</span>
        </div>

        <div class="image-list" id="gallery">
          <div class="empty-state">
            <div class="icon">◻</div>
            <p>No images yet.</p>
          </div>
        </div>
      </section>

      <footer id="footer">CloudSnap</footer>
    </div>
  </div>

  <div class="toast" id="toast">Copied</div>
</body>
</html>
