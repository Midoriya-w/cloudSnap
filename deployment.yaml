apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-native-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloud-native-app
  template:
    metadata:
      labels:
        app: cloud-native-app
    spec:
      containers:
        - name: cloud-native-app
          image: midoriya543/cloud-native-app
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-native-app-service
spec:
  selector:
    app: cloud-native-app
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30000
